
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Interlude Coffee</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

<!-- HEADER -->
<header>
    <!-- LOGO on the left -->
    <div class="logo-container">
        <img src="../assets/Logo/Interlude_Logo_White.png" alt="Interlude Coffee Logo" class="logo">
        <a href="../index.html"><h1>interlude coffee</h1></a>
    </div>

    <!-- NAV BAR on the right -->
    <nav>
        <ul class="nav-links">
            <li><a href="menu.html" target="_blank">MENU</a></li>
            <li><a href="events.html">EVENTS</a></li>
            <li><a href="contact.html" class="active">CONTACT</a></li>
            <li><a href="archive.html">ARCHIVES</a></li>
        </ul>
    </nav>
</header>

<main>

    <!-- SECTION 1: TOP -->
    <section class="contact-top">
        <h2 class="contact-title">where coffee <br> meets community </h2>
        <p class="contact-description">
            Got something in mind? <br>
            We'd love to hear about it 
        </p>
    </section>

    <!-- SECTION 2: BOTTOM - Contact Form -->
    <section class="contact-bottom">
        <form class="contact-form">

            <!-- LINE 1: First Name + Last Name -->
            <div class="form-row">
                <div class="form-field">
                    <input type="text" id="first-name" name="first_name" placeholder="First Name">
                </div>
                <div class="form-field">
                    <input type="text" id="last-name" name="last_name" placeholder="Last Name">
                </div>
            </div>

            <!-- LINE 2: Email + Phone Number -->
            <div class="form-row">
                <div class="form-field">
                    <input type="email" id="email" name="email" placeholder="Email">
                </div>
                <div class="form-field">
                    <input type="tel" id="phone" name="phone" placeholder="Phone Number">
                </div>
            </div>

            <!-- LINE 3: Nature of Inquiry -->
            <div class="form-row form-row--half">
                <div class="form-field">
                    <select id="inquiry" name="inquiry">
                        <option value="" disabled selected>Select an option</option>
                        <option value="general">General Question</option>
                        <option value="event">Private Event</option>
                        <option value="menu">Menu Inquiry</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <!-- LINE 4: Message -->
            <div class="form-row">
                <div class="form-field form-field--full">
                    <textarea id="message" name="message" placeholder="Message"></textarea>
                </div>
            </div>

            <!-- SUBMIT -->
            <div class="form-row">
                <button type="submit" class="form-submit">Send Message</button>
            </div>

        </form>
    </section>

</main>

<footer>
    <div class="footer-left">
        <h2>interlude coffee</h2>
    </div>

    <div class="footer-right">
        <div class="footer-hours">
            <h3>Store Hours</h3>
            <p>Mon–Fri: 7am–6pm</p>
            <p>Sat–Sun: 8am–4pm</p>
        </div>

        <div class="footer-contact">
            <h3>Contact</h3>
            <p>Email: inquiries@interludecoffee.com</p>
            <p>Phone: (123) 456-7890</p>
        </div>
    </div>
</footer>

<script>
    emailjs.init('MaeYHsg7GOtJUalWP');

    const textarea = document.getElementById('message');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    document.querySelector('.contact-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.querySelector('.form-submit');
        btn.textContent = 'Sending...';
        btn.disabled = true;

        emailjs.sendForm('service_xfg7kgo', 'template_jpfec8h', this)
            .then(() => {
                btn.textContent = 'Message Sent';
                this.reset();
                setTimeout(() => {
                    btn.textContent = 'Send Message';
                    btn.disabled = false;
                }, 3000);
            })
            .catch(() => {
                btn.textContent = 'Failed — Try Again';
                btn.disabled = false;
            });
    });
</script>
</body>
</html>
